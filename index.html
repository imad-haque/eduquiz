<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Quiz & Assessment System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 44px 48px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 60px; height: 60px;
      background: #e8f0fe;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .logo svg { width: 34px; height: 34px; }

    h1 { font-size: 22px; font-weight: 700; color: #1a2340; letter-spacing: 2px; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }

    .form-group { width: 100%; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #1a2340; margin-bottom: 6px; }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1a2340;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 42px; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #9ca3af; padding: 0;
      display: flex; align-items: center;
    }

    .btn-login {
      width: 100%; padding: 13px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; letter-spacing: 1.5px;
      cursor: pointer; margin-top: 4px;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-login:hover { background: #1d4ed8; }
    .btn-login:active { transform: scale(0.98); }

    .forgot { display: block; text-align: center; margin-top: 14px; font-size: 14px; color: #2563eb; text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .divider { width: 100%; border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }

    .register-row { font-size: 14px; color: #6b7280; text-align: center; }
    .register-row a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .register-row a:hover { text-decoration: underline; }

    .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; display: none; }

    footer { margin-top: 32px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="14" r="9" stroke="#2563eb" stroke-width="2"/>
        <path d="M17 10v4l2 2" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
        <path d="M13 25h8M15 28h4" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
        <circle cx="17" cy="14" r="2" fill="#2563eb"/>
        <!-- bulb shape -->
        <path d="M12 14a5 5 0 0 1 10 0c0 2.5-1.5 4-2.5 5h-5C13.5 18 12 16.5 12 14z" fill="#bfdbfe"/>
        <text x="14" y="17" font-size="7" fill="#2563eb" font-weight="bold">?</text>
      </svg>
    </div>
    <h1>LOGIN</h1>
    <p class="subtitle">Online Quiz &amp; Assessment System</p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="e.g., user@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Toggle password">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>
    <p class="error-msg" id="err">Invalid email or password. Please try again.</p>
    <button class="btn-login" onclick="doLogin()">LOGIN</button>
    <a class="forgot" href="#">Forgot Password?</a>
    <hr class="divider"/>
    <p class="register-row">Don't have an account? <a href="register.html">Register</a></p>
  </div>
  <footer>© 2024 EduQuiz Inc. | All rights reserved</footer>

  <script>
    function togglePw() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }
    function doLogin() {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const err = document.getElementById('err');
      if (!email || !pw) { err.style.display = 'block'; err.textContent = 'Please fill in all fields.'; return; }
      // Mock login — any credentials work
      sessionStorage.setItem('eduquiz_user', email);
      window.location.href = 'dashboard.html';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
