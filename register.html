<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – EduQuiz</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #eef2f7; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 44px 48px 36px; width: 100%; max-width: 420px; box-shadow: 0 4px 32px rgba(0,0,0,0.10); display: flex; flex-direction: column; align-items: center; }
    .logo { width: 60px; height: 60px; background: #e8f0fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; color: #1a2340; letter-spacing: 2px; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
    .form-group { width: 100%; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #1a2340; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; font-family: inherit; color: #1a2340; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
    .btn-reg { width: 100%; padding: 13px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; letter-spacing: 1.5px; cursor: pointer; margin-top: 4px; transition: background 0.2s; font-family: inherit; }
    .btn-reg:hover { background: #1d4ed8; }
    .divider { width: 100%; border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }
    .login-row { font-size: 14px; color: #6b7280; text-align: center; }
    .login-row a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .login-row a:hover { text-decoration: underline; }
    .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; display: none; text-align: center; }
    footer { margin-top: 32px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 34 34" fill="none" width="34" height="34">
        <circle cx="17" cy="14" r="9" stroke="#2563eb" stroke-width="2"/>
        <path d="M12 14a5 5 0 0 1 10 0c0 2.5-1.5 4-2.5 5h-5C13.5 18 12 16.5 12 14z" fill="#bfdbfe"/>
        <text x="14" y="17" font-size="7" fill="#2563eb" font-weight="bold">?</text>
        <path d="M13 25h8M15 28h4" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>REGISTER</h1>
    <p class="subtitle">Online Quiz &amp; Assessment System</p>

    <div class="form-group">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="e.g., John Doe"/>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="e.g., user@example.com"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 6 characters"/>
    </div>
    <div class="form-group">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Re-enter your password"/>
    </div>

    <p class="error-msg" id="err"></p>
    <button class="btn-reg" onclick="doRegister()">REGISTER</button>
    <hr class="divider"/>
    <p class="login-row">Already have an account? <a href="login.html">Login</a></p>
  </div>
  <footer>© 2024 EduQuiz Inc. | All rights reserved</footer>

  <script>
    function doRegister() {
      const name = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const err = document.getElementById('err');
      err.style.display = 'none';
      if (!name || !email || !pw || !confirm) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }
      if (pw.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
      if (pw !== confirm) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
      sessionStorage.setItem('eduquiz_user', email);
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
